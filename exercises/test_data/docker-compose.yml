services:
  tests:
    image: oven/bun:1.2-alpine
    volumes:
      - ./data:/exercises/data
      - ./src:/exercises/src
      - ./test:/exercises/test
      - ./package.json:/exercises/package.json
    working_dir: /exercises
    command: ["bun", "run", "test"]
    init: true # to ensure signal handling works (and you can kill the container with ctrl-c)
  cli:
    image: oven/bun:1.2-alpine
    volumes:
      - ./bin:/exercises/bin
      - ./data:/exercises/data
      - ./src:/exercises/src
      - ./test:/exercises/test
      - ./package.json:/exercises/package.json
    working_dir: /exercises
    command: ["sh"]
    init: true # to ensure signal handling works (and you can kill the container with ctrl-c)
